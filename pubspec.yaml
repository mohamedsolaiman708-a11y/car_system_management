name: car_system_management
description: "A production-grade car finance management system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  
  # Tech Stack
  supabase_flutter: ^2.0.2
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.3
  
  # Data & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # UI & Media
  flutter_hooks: ^0.20.4
  hooks_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.5
  
  # Export Center (Phase 19)
  pdf: ^3.10.8
  excel: ^4.0.2
  path_provider: ^2.1.2
  printing: ^5.11.1
  share_plus: ^12.0.2

  # Charts (Stage 1)
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  generate: true
  uses-material-design: true
